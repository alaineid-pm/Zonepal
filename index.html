<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZonePal · World Time Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f0f2f7; --surface: #ffffff; --border: #e2e6ef;
  --text-primary: #0f1623; --text-secondary: #5a6478; --text-muted: #9ba3b5;
  --font: 'Plus Jakarta Sans', sans-serif; --mono: 'JetBrains Mono', monospace;
  --now-color: #f43f5e; --overlap-color: rgba(16,185,129,0.18);
}
body.dark {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text-primary: #e6edf3; --text-secondary: #8b949e; --text-muted: #484f58;
  --overlap-color: rgba(16,185,129,0.22);
}
body { font-family: var(--font); background: var(--bg); min-height: 100vh; color: var(--text-primary); transition: background .3s, color .3s; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0; background: radial-gradient(ellipse 800px 600px at 10% 0%, rgba(110,231,183,.12) 0%, transparent 60%), radial-gradient(ellipse 600px 500px at 90% 100%, rgba(167,139,250,.12) 0%, transparent 60%); transition: opacity .3s; }
body.dark::before { opacity: .4; }
.app { position:relative; z-index:1; max-width:1440px; margin:0 auto; padding:0 16px 60px; }

/* HEADER */
header { padding:24px 0 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-mark { width:38px; height:38px; background:linear-gradient(135deg,#10b981,#6366f1); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 4px 12px rgba(99,102,241,.3); }
.logo-text { font-size:22px; font-weight:800; letter-spacing:-.5px; background:linear-gradient(135deg,#10b981,#6366f1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.logo-sub { font-size:11px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; font-weight:500; margin-top:1px; }
.header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.date-nav { display:flex; align-items:center; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:6px 10px; }
.date-nav button { background:none; border:none; color:var(--text-secondary); cursor:pointer; width:28px; height:28px; border-radius:7px; font-size:14px; display:flex; align-items:center; justify-content:center; transition:background .15s,color .15s; }
.date-nav button:hover { background:var(--bg); color:var(--text-primary); }
.date-display { font-size:13px; font-weight:600; color:var(--text-primary); padding:0 6px; min-width:130px; text-align:center; font-family:var(--mono); }
.icon-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--text-secondary); font-size:16px; width:38px; height:38px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; text-decoration:none; }
.icon-btn:hover { border-color:#10b981; color:#10b981; }
.add-btn { display:flex; align-items:center; gap:6px; background:linear-gradient(135deg,#10b981,#6366f1); border:none; border-radius:12px; color:white; font-family:var(--font); font-size:13px; font-weight:700; padding:10px 18px; cursor:pointer; transition:transform .15s,box-shadow .15s; box-shadow:0 4px 14px rgba(99,102,241,.3); }
.add-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(99,102,241,.4); }

/* SELECTED PANEL */
.sel-panel { background:var(--surface); border:1px solid var(--border); border-radius:18px; overflow:hidden; max-height:0; opacity:0; padding:0 20px; margin-bottom:0; transition: max-height .35s cubic-bezier(.16,1,.3,1), opacity .25s ease, padding .3s ease, margin-bottom .3s ease; }
.sel-panel.open { max-height:240px; opacity:1; padding:18px 20px; margin-bottom:16px; }
.sel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.sel-title { font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--text-muted); }
.sel-headline { font-family:var(--mono); font-size:14px; font-weight:800; color:var(--text-primary); }
.sel-close { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:16px; width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; transition:background .15s,color .15s; }
.sel-close:hover { background:var(--bg); color:var(--text-primary); }
.sel-cards { display:flex; flex-wrap:wrap; gap:10px; }
.sel-card { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:12px 16px; min-width:140px; flex:1; }
.sel-card.home-card { background:linear-gradient(135deg,#0f2027 0%,#1a2e3f 100%); border-color:rgba(16,185,129,.3); }
.sc-badge { font-size:8px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:#10b981; margin-bottom:5px; }
.sc-city { font-size:12px; font-weight:700; color:var(--text-secondary); margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sel-card.home-card .sc-city { color:rgba(255,255,255,.6); }
.sc-time { font-family:var(--mono); font-size:20px; font-weight:800; color:var(--text-primary); line-height:1; }
.sel-card.home-card .sc-time { color:#10b981; }
.sc-date { font-size:10px; color:var(--text-muted); margin-top:3px; font-family:var(--mono); }
.sel-card.home-card .sc-date { color:rgba(255,255,255,.3); }

/* TIMELINE OUTER */
.tl-outer { overflow-x:auto; overflow-y:visible; padding-bottom:10px; position:relative; border-radius:18px; }
.tl-outer::-webkit-scrollbar { height:6px; }
.tl-outer::-webkit-scrollbar-track { background:var(--border); border-radius:3px; }
.tl-outer::-webkit-scrollbar-thumb { background:#c4c9d6; border-radius:3px; }

/* TIMELINE GRID */
.tl-grid {
  display:inline-grid;
  row-gap:0; column-gap:0;
  min-width:max-content;
  position:relative;
}

/* CORNER */
.tl-corner {
  background:var(--surface);
  border-bottom:2px solid var(--border);
  border-right:3px solid var(--border);
  position:sticky; left:0; z-index:20;
  display:flex; align-items:flex-end; padding:0 14px 10px;
  font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted);
}

/* HOUR HEADERS */
.hour-hdr {
  background:var(--surface);
  border-bottom:2px solid var(--border);
  border-right:1px solid rgba(0,0,0,.05);
  height:52px;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  padding-bottom:10px; gap:4px;
  cursor:pointer; user-select:none;
  position:relative;
  transition:background .1s;
}
.hour-hdr:hover { background:rgba(99,102,241,.05); }
.hdr-label { font-family:var(--mono); font-size:10px; font-weight:700; color:var(--text-secondary); letter-spacing:.3px; }
.now-hdr .hdr-label { color:var(--now-color); font-weight:800; }
.now-hdr::after { content:'▼'; position:absolute; bottom:-1px; font-size:7px; color:var(--now-color); }
.overlap-dot { width:5px; height:5px; border-radius:50%; background:#10b981; flex-shrink:0; }

/* CITY LABEL (sticky left) */
.city-label {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  border-right:3px solid var(--border);
  position:sticky; left:0; z-index:10;
  display:flex; align-items:center; gap:12px;
  padding:10px 14px;
  min-height:68px;
  transition:background .2s;
}
.city-label.home-row { background:linear-gradient(120deg,#0e1d2a 0%,#162638 100%); }
.cl-accent { width:4px; align-self:stretch; border-radius:3px; flex-shrink:0; }
.cl-info { flex:1; overflow:hidden; min-width:0; }
.cl-badge { display:inline-flex; align-items:center; gap:3px; background:linear-gradient(135deg,#10b981,#059669); color:white; font-size:8px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; padding:2px 7px; border-radius:100px; margin-bottom:4px; }
.cl-name { font-size:14px; font-weight:800; letter-spacing:-.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.home-row .cl-name { color:#fff; }
.cl-country { font-size:10px; color:var(--text-muted); font-weight:500; white-space:nowrap; }
.home-row .cl-country { color:rgba(255,255,255,.4); }
.cl-live { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--text-secondary); margin-top:3px; }
.home-row .cl-live { color:#10b981; }
.cl-offset { font-size:9px; font-family:var(--mono); color:var(--text-muted); }
.home-row .cl-offset { color:rgba(255,255,255,.25); }
.cl-remove { width:22px; height:22px; flex-shrink:0; border:none; background:none; color:var(--text-muted); border-radius:6px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s,background .15s,color .15s; }
.city-label:hover .cl-remove { opacity:1; }
.cl-remove:hover { background:#fee2e2; color:#ef4444; }

/* ROW DRAG HANDLE */
.drag-handle { display:flex; flex-direction:column; gap:3px; padding:4px 4px; opacity:0; transition:opacity .15s; cursor:grab; flex-shrink:0; align-self:center; border-radius:4px; }
.city-label:hover .drag-handle { opacity:.45; }
.drag-handle:hover { opacity:1 !important; background:rgba(0,0,0,.06); }
.drag-handle:active { cursor:grabbing; }
.drag-handle span { display:block; width:13px; height:2px; border-radius:1px; background:currentColor; }
.home-row .drag-handle span { background:rgba(255,255,255,.5); }

/* ROW GHOST */
#rowGhost { position:fixed; top:-9999px; left:20px; width:185px; background:var(--surface); border-radius:14px; padding:14px 16px; box-shadow:0 16px 40px rgba(0,0,0,.28); border:2px solid #10b981; pointer-events:none; z-index:9999; font-family:var(--font); opacity:0; transition:border-color .15s; }
#rowGhost.will-be-home { border-color:#f43f5e; }
.rg-name { font-size:14px; font-weight:800; color:var(--text-primary); }
.rg-time { font-family:var(--mono); font-size:17px; font-weight:700; color:#10b981; margin-top:4px; }
#rowGhost.will-be-home .rg-time { color:#f43f5e; }
.rg-hint { font-size:9px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:#f43f5e; margin-top:6px; opacity:0; transition:opacity .15s; }
#rowGhost.will-be-home .rg-hint { opacity:1; }

/* DROP LINE */
#dropLine { position:fixed; height:3px; background:#10b981; border-radius:2px; pointer-events:none; z-index:9998; opacity:0; box-shadow:0 0 8px rgba(16,185,129,.5); transition:top .04s; }
#dropLine.will-be-home { background:#f43f5e; box-shadow:0 0 8px rgba(244,63,94,.5); }

/* DRAGGING ROW */
.row-dragging { opacity:.25 !important; pointer-events:none; }

/* HOUR CELLS */
.h-cell {
  height:68px;
  border-bottom:1px solid rgba(0,0,0,.05);
  border-right:1px solid rgba(0,0,0,.06);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; user-select:none;
  position:relative;
  font-family:var(--mono);
  gap:2px;
  transition:filter .08s;
}
.h-cell:hover { filter:brightness(.89) saturate(1.2); }
.c-hr { font-size:14px; font-weight:800; line-height:1; }
.c-ap { font-size:9px; font-weight:800; letter-spacing:.4px; text-transform:uppercase; opacity:.9; }

/* Color classes */
.tile-sleep     { background:#dde1ea; color:#7a8298; }
.tile-early     { background:#bfdbfe; color:#1d4ed8; }
.tile-morning   { background:#a7f3d0; color:#065f46; }
.tile-work      { background:#6ee7b7; color:#064e3b; }
.tile-afternoon { background:#fde68a; color:#78350f; }
.tile-evening   { background:#fca5a5; color:#7f1d1d; }
.tile-night     { background:#c4b5fd; color:#4c1d95; }
body.dark .tile-sleep     { background:#1e2330; color:#6b7280; }
body.dark .tile-early     { background:#1e2d45; color:#60a5fa; }
body.dark .tile-morning   { background:#14312b; color:#34d399; }
body.dark .tile-work      { background:#0d3321; color:#6ee7b7; }
body.dark .tile-afternoon { background:#322a0e; color:#fcd34d; }
body.dark .tile-evening   { background:#321515; color:#fca5a5; }
body.dark .tile-night     { background:#1e1535; color:#a78bfa; }

/* SELECTED COLUMN */
.h-cell.col-sel { filter:brightness(.82) saturate(1.5); outline:2px solid rgba(99,102,241,.9); outline-offset:-2px; z-index:2; }
.hour-hdr.col-sel { background:rgba(99,102,241,.1); outline:2px solid rgba(99,102,241,.8); outline-offset:-2px; z-index:2; }
.hour-hdr.col-sel .hdr-label { color:#6366f1; font-weight:800; }

/* NOW column */
.h-cell.now-col::after { content:''; position:absolute; inset:0; border:2px solid rgba(244,63,94,.5); background:rgba(244,63,94,.08); pointer-events:none; }

/* OVERLAP column */
.h-cell.overlap-col::before { content:''; position:absolute; inset:0; border-left:3px solid #10b981; background:var(--overlap-color); pointer-events:none; z-index:0; }

/* NOW LINE (precise minute position) */
#nowLine { position:absolute; top:0; bottom:0; width:2px; background:var(--now-color); opacity:.8; pointer-events:none; z-index:15; box-shadow:0 0 8px rgba(244,63,94,.5); border-radius:1px; }
#nowLine::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:8px; height:8px; border-radius:50%; background:var(--now-color); margin-top:-1px; }

/* ADD ROW */
.add-row-wrap { position:sticky; left:0; z-index:5; }
.add-row-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; margin-top:2px; background:var(--surface); border:2px dashed var(--border); border-radius:14px; padding:14px; color:var(--text-muted); font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; font-family:var(--font); }
.add-row-btn:hover { border-color:#10b981; color:#10b981; background:rgba(16,185,129,.04); }

/* BOTTOM BAR */
.bottom-bar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-top:16px; }
.legend { display:flex; flex-wrap:wrap; gap:8px; padding:10px 14px; background:var(--surface); border-radius:12px; border:1px solid var(--border); flex:1; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:10px; font-weight:600; color:var(--text-secondary); }
.legend-dot { width:10px; height:10px; border-radius:3px; }
.toggle-pills { display:flex; gap:6px; }
.toggle-pill { display:flex; align-items:center; gap:5px; background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:5px 11px; font-size:11px; font-weight:700; cursor:pointer; transition:all .15s; color:var(--text-secondary); white-space:nowrap; }
.toggle-pill:hover { border-color:#10b981; color:#10b981; }
.toggle-pill.on { background:#10b981; border-color:#10b981; color:white; }
.toggle-pill .dot { width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.7; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(15,22,35,.55); backdrop-filter:blur(6px); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border-radius:24px; padding:28px; width:100%; max-width:480px; box-shadow:0 24px 60px rgba(0,0,0,.25); transform:translateY(20px) scale(.97); transition:transform .25s cubic-bezier(.16,1,.3,1); position:relative; }
.modal-overlay.open .modal { transform:translateY(0) scale(1); }
.modal-title { font-size:20px; font-weight:800; margin-bottom:20px; letter-spacing:-.4px; }
.search-input { width:100%; padding:13px 16px; border:2px solid var(--border); border-radius:14px; font-family:var(--font); font-size:15px; outline:none; transition:border-color .2s,box-shadow .2s; background:var(--bg); margin-bottom:14px; color:var(--text-primary); }
.search-input:focus { border-color:#10b981; box-shadow:0 0 0 4px rgba(16,185,129,.1); }
.city-list { max-height:320px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
.city-option { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-radius:12px; cursor:pointer; transition:background .15s; border:1px solid transparent; }
.city-option:hover { background:var(--bg); border-color:var(--border); }
.city-option-name { font-weight:700; font-size:14px; }
.city-option-country { font-size:11px; color:var(--text-muted); margin-top:1px; }
.city-option-time { font-family:var(--mono); font-size:13px; font-weight:500; color:var(--text-secondary); }
.modal-close { position:absolute; top:20px; right:20px; width:32px; height:32px; border-radius:8px; border:none; background:var(--bg); cursor:pointer; font-size:16px; color:var(--text-secondary); display:flex; align-items:center; justify-content:center; }
.modal-close:hover { background:var(--border); }

/* TOAST */
#saveToast { position:fixed; top:20px; right:20px; z-index:200; background:#0f1623; color:white; padding:10px 18px; border-radius:100px; font-size:12px; font-weight:600; font-family:var(--mono); display:flex; align-items:center; gap:7px; box-shadow:0 8px 24px rgba(0,0,0,.25); opacity:0; transform:translateY(-8px); transition:opacity .25s,transform .25s; pointer-events:none; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-mark">⏱</div>
      <div>
        <div class="logo-text">ZonePal</div>
        <div class="logo-sub">World Time Converter</div>
      </div>
    </div>
    <div class="header-right">
      <div class="date-nav">
        <button onclick="shiftDay(-1)">‹</button>
        <div class="date-display" id="dateDisplay"></div>
        <button onclick="shiftDay(1)">›</button>
        <button onclick="shiftDay(0)" style="font-size:11px;font-weight:700;color:#10b981;">Today</button>
      </div>
      <button class="icon-btn" id="darkBtn" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
      <a href="TimeConvertor.html" class="icon-btn" title="Switch to vertical view">⊞</a>
      <button class="add-btn" onclick="openModal()">＋ Add City</button>
    </div>
  </header>

  <!-- Selected time panel -->
  <div class="sel-panel" id="selPanel">
    <div class="sel-header">
      <div>
        <div class="sel-title">Conversion at a glance</div>
        <div class="sel-headline" id="selHeadline"></div>
      </div>
      <button class="sel-close" onclick="clearSelection()" title="Close">✕</button>
    </div>
    <div class="sel-cards" id="selCards"></div>
  </div>

  <!-- Timeline -->
  <div class="tl-outer" id="tlOuter">
    <div class="tl-grid" id="tlGrid"></div>
  </div>

  <!-- Add city -->
  <div style="margin-top:2px;">
    <button class="add-row-btn" onclick="openModal()">＋ Add another city</button>
  </div>

  <!-- Legend + toggles -->
  <div class="bottom-bar">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#dde1ea"></div>Sleep</div>
      <div class="legend-item"><div class="legend-dot" style="background:#bfdbfe"></div>Early</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a7f3d0"></div>Morning</div>
      <div class="legend-item"><div class="legend-dot" style="background:#6ee7b7"></div>Work</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fde68a"></div>Afternoon</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fca5a5"></div>Evening</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c4b5fd"></div>Night</div>
      <div class="legend-item"><div class="legend-dot" style="background:#10b981;border-radius:50%;"></div>Best overlap hours</div>
    </div>
    <div class="toggle-pills">
      <div class="toggle-pill on" id="pillNow"     onclick="toggleFeature('now')">    <div class="dot"></div>Now</div>
      <div class="toggle-pill on" id="pillOverlap" onclick="toggleFeature('overlap')"><div class="dot"></div>Overlap</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Add a City</div>
    <input class="search-input" id="searchInput" placeholder="Search city or timezone…" oninput="filterCities(this.value)" autocomplete="off">
    <div class="city-list" id="cityList"></div>
  </div>
</div>

<div id="saveToast"><span style="color:#10b981;font-size:14px;">✓</span> Saved</div>
<div id="rowGhost">
  <div class="rg-name" id="rgName"></div>
  <div class="rg-time" id="rgTime"></div>
  <div class="rg-hint">🏠 Set as Home</div>
</div>
<div id="dropLine"></div>

<script>
const CITIES_DB = [
  {name:"New York",country:"United States",tz:"America/New_York"},
  {name:"Los Angeles",country:"United States",tz:"America/Los_Angeles"},
  {name:"Chicago",country:"United States",tz:"America/Chicago"},
  {name:"Toronto",country:"Canada",tz:"America/Toronto"},
  {name:"Vancouver",country:"Canada",tz:"America/Vancouver"},
  {name:"Mexico City",country:"Mexico",tz:"America/Mexico_City"},
  {name:"São Paulo",country:"Brazil",tz:"America/Sao_Paulo"},
  {name:"Buenos Aires",country:"Argentina",tz:"America/Argentina/Buenos_Aires"},
  {name:"Bogotá",country:"Colombia",tz:"America/Bogota"},
  {name:"Lima",country:"Peru",tz:"America/Lima"},
  {name:"Santiago",country:"Chile",tz:"America/Santiago"},

  {name:"Jakarta",country:"Indonesia",tz:"Asia/Jakarta"},
  {name:"Singapore",country:"Singapore",tz:"Asia/Singapore"},

  {name:"UTC",country:"Coordinated Universal Time",tz:"UTC"},
];

const ACCENTS = ['#10b981','#6366f1','#f59e0b','#ef4444','#3b82f6','#ec4899','#8b5cf6','#14b8a6'];
const WORK_START = 9, WORK_END = 17;
const CELL_W = 46, LABEL_W = 200;

let activeCities = [], homeIdx = 0, selectedHour = null;
let activeDate = new Date(); activeDate.setHours(0,0,0,0);
let darkMode = false, features = { now: true, overlap: true };
let dragActive = false, saveToastTimer = null, liveTimer = null;

// ── HELPERS ──
function mk(tag, cls) { const e = document.createElement(tag); if(cls) e.className=cls; return e; }

function getLocalHour(utcDate, tz) {
  return parseInt(new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'numeric',hour12:false}).format(utcDate),10)%24;
}
function localHourToUTC(date, hour, tz) {
  const probe = new Date(date.getTime()+hour*3600000);
  return probe.getTime()+(hour-getLocalHour(probe,tz))*3600000;
}
function getUTCOffset(tz) {
  const s = new Intl.DateTimeFormat('en',{timeZone:tz,timeZoneName:'shortOffset'}).formatToParts(new Date());
  return (s.find(p=>p.type==='timeZoneName')||{value:'UTC'}).value;
}
function getCurrentMinute(tz) {
  return parseInt(new Intl.DateTimeFormat('en-US',{timeZone:tz,minute:'2-digit'}).format(new Date()),10);
}
function formatCurrentTime(tz) {
  return new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}).format(new Date());
}
function fmtFullTime(utcMs, tz) {
  return new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'numeric',minute:'2-digit',hour12:true}).format(new Date(utcMs));
}
function fmtDate(utcMs, tz) {
  return new Intl.DateTimeFormat('en-US',{timeZone:tz,weekday:'short',month:'short',day:'numeric'}).format(new Date(utcMs));
}
function fmtHourShort(h) {
  if (h===0) return '12a'; if (h===12) return '12p';
  return h<12 ? `${h}a` : `${h-12}p`;
}
function getTileClass(h) {
  if(h<5)return'tile-sleep'; if(h<7)return'tile-early'; if(h<9)return'tile-morning';
  if(h<17)return'tile-work'; if(h<20)return'tile-afternoon'; if(h<22)return'tile-evening';
  return'tile-night';
}
function fmtCellTime(utcMs, tz) {
  const parts = new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'numeric',minute:'2-digit',hour12:true}).formatToParts(new Date(utcMs));
  const hr = parts.find(p=>p.type==='hour')?.value||'0';
  const mn = parts.find(p=>p.type==='minute')?.value||'00';
  const ap = (parts.find(p=>p.type==='dayperiod')?.value||'').toUpperCase()||'';
  return { hr, mn, ap, hasMin: mn!=='00' };
}
function computeOverlapHours() {
  const set=new Set(); if(activeCities.length<2)return set;
  const homeTz=activeCities[homeIdx].tz;
  for(let h=0;h<24;h++){
    const utcMs=localHourToUTC(activeDate,h,homeTz);
    if(activeCities.every(c=>{const lh=getLocalHour(new Date(utcMs),c.tz);return lh>=WORK_START&&lh<WORK_END;})) set.add(h);
  }
  return set;
}
function getCurrentHomeHour() {
  const now=new Date(), todayMs=(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();})();
  if(activeDate.getTime()!==todayMs) return -1;
  return getLocalHour(now,activeCities[homeIdx].tz);
}

// ── BUILD GRID ──
function buildGrid() {
  const grid = document.getElementById('tlGrid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `${LABEL_W}px repeat(24, ${CELL_W}px)`;

  const homeTz = activeCities[homeIdx].tz;
  const overlapHours = features.overlap ? computeOverlapHours() : new Set();
  const nowHour = features.now ? getCurrentHomeHour() : -1;

  // Corner
  const corner = mk('div','tl-corner');
  corner.textContent = activeCities[homeIdx].name + ' →';
  grid.appendChild(corner);

  // Hour header row
  for (let h=0; h<24; h++) {
    const isSel = h===selectedHour, isNow = h===nowHour, isOvlp = overlapHours.has(h);
    let cls = 'hour-hdr'; if(isNow) cls+=' now-hdr'; if(isSel) cls+=' col-sel';
    const hdr = mk('div', cls);
    hdr.dataset.h = h;
    if (isOvlp) { const dot=mk('span','overlap-dot'); hdr.appendChild(dot); }
    const lbl = mk('span','hdr-label');
    const hourNum = h===0||h===12 ? 12 : h%12;
    lbl.innerHTML = `<span style="display:block;line-height:1">${hourNum}</span><span style="display:block;font-size:8px;font-weight:800;letter-spacing:.3px;opacity:.8">${h<12?'AM':'PM'}</span>`;
    hdr.appendChild(lbl);
    hdr.addEventListener('mousedown', e=>{ e.preventDefault(); dragActive=true; selectHour(h); });
    hdr.addEventListener('mouseenter', ()=>{ if(dragActive) selectHour(h); });
    grid.appendChild(hdr);
  }

  // City rows
  activeCities.forEach((city, ci) => {
    const isHome = ci===homeIdx;
    const accent = ACCENTS[ci%ACCENTS.length];

    // Label cell
    const label = mk('div','city-label'+(isHome?' home-row':''));
    label.dataset.ci = ci;
    // Drag handle
    const handle = mk('div','drag-handle'); handle.title='Drag to reorder';
    for(let i=0;i<3;i++) handle.appendChild(mk('span'));
    handle.addEventListener('mousedown', e=>{ e.preventDefault(); e.stopPropagation(); onRowDragStart(e,ci); });
    const accentBar = mk('div','cl-accent');
    accentBar.style.background = accent;
    const info = mk('div','cl-info');
    if (isHome) info.innerHTML += `<div class="cl-badge">🏠 Home</div>`;
    info.innerHTML += `<div class="cl-name">${city.name}</div><div class="cl-country">${city.country}</div><div class="cl-live" id="cl-${ci}"></div><div class="cl-offset">${getUTCOffset(city.tz)}</div>`;
    label.appendChild(handle);
    label.appendChild(accentBar);
    label.appendChild(info);
    if (!isHome) {
      const rm = mk('button','cl-remove'); rm.title='Remove'; rm.textContent='✕';
      rm.addEventListener('click', ()=>removeCity(ci));
      label.appendChild(rm);
    }
    grid.appendChild(label);

    // Hour cells
    for (let h=0; h<24; h++) {
      const utcMs = localHourToUTC(activeDate, h, homeTz);
      const localH = getLocalHour(new Date(utcMs), city.tz);
      const {hr, mn, ap, hasMin} = fmtCellTime(utcMs, city.tz);
      const isSel=h===selectedHour, isNow=h===nowHour, isOvlp=overlapHours.has(h);
      let cls='h-cell '+getTileClass(localH);
      if(isNow) cls+=' now-col'; if(isOvlp) cls+=' overlap-col'; if(isSel) cls+=' col-sel';
      const cell = mk('div', cls);
      cell.dataset.h=h; cell.dataset.ci=ci;
      const hrEl=mk('span','c-hr'); hrEl.textContent=hasMin?`${hr}:${mn}`:hr;
      const apEl=mk('span','c-ap'); apEl.textContent=ap;
      cell.appendChild(hrEl); cell.appendChild(apEl);
      cell.addEventListener('mousedown', e=>{ e.preventDefault(); dragActive=true; selectHour(h); });
      cell.addEventListener('mouseenter', ()=>{ if(dragActive) selectHour(h); });
      grid.appendChild(cell);
    }
  });

  // NOW fractional line
  if (nowHour>=0) {
    const outer = document.getElementById('tlOuter');
    let nowLine = document.getElementById('nowLine');
    if (!nowLine) { nowLine=mk('div',''); nowLine.id='nowLine'; outer.appendChild(nowLine); }
    positionNowLine(nowHour);
  } else {
    const old = document.getElementById('nowLine');
    if(old) old.remove();
  }

  updateLiveTimes();
}

function positionNowLine(nowHour) {
  const nowLine = document.getElementById('nowLine');
  if (!nowLine || !activeCities.length) return;
  const mins = getCurrentMinute(activeCities[homeIdx].tz);
  const leftPx = LABEL_W + nowHour*CELL_W + (mins/60)*CELL_W;
  nowLine.style.left = leftPx + 'px';
  // Height: 52px header + 68px × n cities
  nowLine.style.height = (52 + 68*activeCities.length) + 'px';
  nowLine.style.top = '0';
}

// ── SELECTION ──
function selectHour(h) {
  selectedHour = (selectedHour===h && !dragActive) ? null : h;
  updateSelected();
}
function clearSelection() { selectedHour=null; updateSelected(); }

function updateSelected() {
  document.querySelectorAll('#tlGrid .h-cell, #tlGrid .hour-hdr').forEach(el=>{
    el.classList.toggle('col-sel', parseInt(el.dataset.h,10)===selectedHour);
  });
  renderPanel();
}

// ── PANEL ──
function renderPanel() {
  const panel = document.getElementById('selPanel');
  if (selectedHour===null) { panel.classList.remove('open'); return; }

  const homeTz = activeCities[homeIdx].tz;
  const utcMs = localHourToUTC(activeDate, selectedHour, homeTz);
  document.getElementById('selHeadline').textContent =
    `${fmtFullTime(utcMs, homeTz)}  ·  ${fmtDate(utcMs, homeTz)}  in  ${activeCities[homeIdx].name}`;

  const cards = document.getElementById('selCards');
  cards.innerHTML='';
  activeCities.forEach((city,ci)=>{
    const isHome=ci===homeIdx;
    const card=mk('div','sel-card'+(isHome?' home-card':''));
    card.innerHTML=`${isHome?'<div class="sc-badge">🏠 Home</div>':''}<div class="sc-city">${city.name}</div><div class="sc-time">${fmtFullTime(utcMs,city.tz)}</div><div class="sc-date">${fmtDate(utcMs,city.tz)}</div>`;
    cards.appendChild(card);
  });
  panel.classList.add('open');
}

// ── LIVE TIMES ──
function updateLiveTimes() {
  activeCities.forEach((city,ci)=>{
    const el=document.getElementById(`cl-${ci}`);
    if(el) el.textContent=formatCurrentTime(city.tz);
  });
}
function startLive() {
  clearInterval(liveTimer);
  liveTimer=setInterval(()=>{ updateLiveTimes(); positionNowLine(getCurrentHomeHour()); }, 1000);
}

// ── DATE NAV ──
function updateDateDisplay() {
  const today=new Date(); today.setHours(0,0,0,0);
  const isToday=activeDate.getTime()===today.getTime();
  const fmt=new Intl.DateTimeFormat('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}).format(activeDate);
  document.getElementById('dateDisplay').textContent=isToday?'Today':fmt;
}
function shiftDay(d) {
  if(d===0){activeDate=new Date();activeDate.setHours(0,0,0,0);}
  else activeDate.setDate(activeDate.getDate()+d);
  selectedHour=null;
  updateDateDisplay();
  buildGrid();
}

// ── DARK MODE ──
function toggleDark() {
  darkMode=!darkMode;
  document.body.classList.toggle('dark',darkMode);
  document.getElementById('darkBtn').textContent=darkMode?'☀️':'🌙';
  try{localStorage.setItem('zonepal_tl_dark',darkMode?'1':'0');}catch(e){}
}

// ── FEATURE TOGGLES ──
function toggleFeature(f) {
  features[f]=!features[f];
  document.getElementById('pill'+f.charAt(0).toUpperCase()+f.slice(1)).classList.toggle('on',features[f]);
  buildGrid();
}

// ── MODAL ──
function openModal() {
  document.getElementById('searchInput').value='';
  filterCities('');
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('searchInput').focus(),100);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOnBg(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }
function filterCities(q) {
  const list=document.getElementById('cityList');
  const added=new Set(activeCities.map(c=>c.tz+c.name));
  const results=q?CITIES_DB.filter(c=>(c.name+' '+c.country).toLowerCase().includes(q.toLowerCase())):CITIES_DB;
  list.innerHTML='';
  results.slice(0,40).forEach(city=>{
    if(added.has(city.tz+city.name)) return;
    const opt=mk('div','city-option');
    opt.innerHTML=`<div><div class="city-option-name">${city.name}</div><div class="city-option-country">${city.country}</div></div><div class="city-option-time">${formatCurrentTime(city.tz)}</div>`;
    opt.addEventListener('click',()=>{ addCity(city); closeModal(); });
    list.appendChild(opt);
  });
}

// ── CITY MANAGEMENT ──
function addCity(city) {
  if(activeCities.length>=8) return;
  activeCities.push(city);
  saveCities(); buildGrid();
}
function removeCity(idx) {
  if(activeCities.length<=1) return;
  activeCities.splice(idx,1);
  if(homeIdx>=activeCities.length) homeIdx=0;
  saveCities(); buildGrid();
}

// ── STORAGE ──
function saveCities() {
  try{
    localStorage.setItem('zonepal_tl_cities',JSON.stringify(activeCities.map(c=>({name:c.name,tz:c.tz}))));
    localStorage.setItem('zonepal_tl_home',homeIdx);
  }catch(e){}
  const t=document.getElementById('saveToast');
  t.style.opacity='1'; t.style.transform='translateY(0)';
  clearTimeout(saveToastTimer);
  saveToastTimer=setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateY(-8px)'; },1800);
}
function loadCities() {
  try{
    const raw=localStorage.getItem('zonepal_tl_cities');
    if(!raw) return null;
    const r=JSON.parse(raw).map(s=>CITIES_DB.find(c=>c.name===s.name&&c.tz===s.tz)).filter(Boolean);
    return r.length?r:null;
  }catch(e){return null;}
}

// ── ROW DRAG (reorder cities) ──
let rowDragIdx=null, rowOverIdx=null;

function onRowDragStart(e, ci) {
  rowDragIdx = ci;
  const ghost = document.getElementById('rowGhost');
  document.getElementById('rgName').textContent = activeCities[ci].name;
  document.getElementById('rgTime').textContent = formatCurrentTime(activeCities[ci].tz);
  ghost.style.top = (e.clientY - 20) + 'px';
  ghost.style.opacity = '1';
  ghost.classList.remove('will-be-home');
  document.querySelectorAll(`#tlGrid [data-ci="${ci}"]`).forEach(el=>el.classList.add('row-dragging'));
  document.addEventListener('mousemove', onRowDragMove);
  document.addEventListener('mouseup', onRowDragEnd);
}

function onRowDragMove(e) {
  if (rowDragIdx===null) return;
  const ghost = document.getElementById('rowGhost');
  ghost.style.top = (e.clientY - 20) + 'px';

  const labels = [...document.querySelectorAll('#tlGrid .city-label')];
  let targetCi=null, insertBefore=true;
  labels.forEach(lbl=>{
    const r = lbl.getBoundingClientRect();
    if (e.clientY >= r.top && e.clientY < r.bottom) {
      targetCi = parseInt(lbl.dataset.ci, 10);
      // Entire first row = "set as home" zone (no need to hit exact top half)
      insertBefore = (targetCi===0) || (e.clientY < r.top + r.height/2);
    }
  });

  if (targetCi!==null) {
    let ins = insertBefore ? targetCi : targetCi+1;
    let t = ins > rowDragIdx ? ins-1 : ins;
    t = Math.max(0, Math.min(t, activeCities.length-1));
    rowOverIdx = t;
    const willBeHome = t===0 && rowDragIdx!==0;
    ghost.classList.toggle('will-be-home', willBeHome);

    const dropLine = document.getElementById('dropLine');
    const tgtLabel = document.querySelector(`#tlGrid .city-label[data-ci="${targetCi}"]`);
    if (tgtLabel) {
      const r = tgtLabel.getBoundingClientRect();
      const outerR = document.getElementById('tlOuter').getBoundingClientRect();
      dropLine.style.left  = outerR.left + 'px';
      dropLine.style.width = outerR.width + 'px';
      dropLine.style.top   = (insertBefore ? r.top : r.bottom) - 1.5 + 'px';
      dropLine.style.opacity = '1';
      dropLine.classList.toggle('will-be-home', willBeHome);
    }
  } else {
    rowOverIdx = null;
    document.getElementById('dropLine').style.opacity = '0';
    ghost.classList.remove('will-be-home');
  }
}

function onRowDragEnd(e) {
  document.removeEventListener('mousemove', onRowDragMove);
  document.removeEventListener('mouseup', onRowDragEnd);
  const ghost = document.getElementById('rowGhost');
  ghost.style.opacity='0'; ghost.style.top='-9999px';
  ghost.classList.remove('will-be-home');
  document.getElementById('dropLine').style.opacity='0';
  document.querySelectorAll('.row-dragging').forEach(el=>el.classList.remove('row-dragging'));

  if (rowDragIdx!==null && rowOverIdx!==null && rowDragIdx!==rowOverIdx) {
    const item = activeCities.splice(rowDragIdx,1)[0];
    const wasHome = rowDragIdx===homeIdx;
    if (!wasHome && homeIdx>rowDragIdx) homeIdx--;
    activeCities.splice(rowOverIdx,0,item);
    if (rowOverIdx===0) { homeIdx=0; }
    else if (wasHome) { homeIdx=rowOverIdx; }
    else if (homeIdx>=rowOverIdx) { homeIdx++; }
    saveCities(); buildGrid();
  } else {
    buildGrid();
  }
  rowDragIdx=null; rowOverIdx=null;
}

// ── GLOBAL EVENTS ──
document.addEventListener('mouseup',()=>{ dragActive=false; });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){selectedHour=null;updateSelected();} });

// ── SCROLL NOW LINE into view on load ──
function scrollToNow() {
  const nowHour = getCurrentHomeHour();
  if (nowHour<0) return;
  const outer = document.getElementById('tlOuter');
  const targetLeft = LABEL_W + nowHour*CELL_W - outer.clientWidth/2 + CELL_W/2;
  outer.scrollLeft = Math.max(0, targetLeft);
}

// ── INIT ──
activeCities = loadCities() || [
  CITIES_DB.find(c=>c.name==='New York'),
  CITIES_DB.find(c=>c.name==='London'),
  CITIES_DB.find(c=>c.name==='Tokyo'),
];
try{ homeIdx=Math.min(parseInt(localStorage.getItem('zonepal_tl_home')||'0',10)||0,activeCities.length-1); }catch(e){homeIdx=0;}
try{ if(localStorage.getItem('zonepal_tl_dark')==='1') toggleDark(); }catch(e){}

updateDateDisplay();
buildGrid();
startLive();
setTimeout(scrollToNow, 100);
</script>
