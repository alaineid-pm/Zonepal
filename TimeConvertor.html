<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZonePal · World Time Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f0f2f7; --surface: #ffffff; --border: #e2e6ef;
  --text-primary: #0f1623; --text-secondary: #5a6478; --text-muted: #9ba3b5;
  --font: 'Plus Jakarta Sans', sans-serif; --mono: 'JetBrains Mono', monospace;
  --now-color: #f43f5e; --overlap-color: rgba(16,185,129,0.18); --day-border: #6366f1;
}
body.dark {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text-primary: #e6edf3; --text-secondary: #8b949e; --text-muted: #484f58;
  --overlap-color: rgba(16,185,129,0.22);
}
body { font-family: var(--font); background: var(--bg); min-height: 100vh; color: var(--text-primary); transition: background .3s, color .3s; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0; background: radial-gradient(ellipse 800px 600px at 10% 0%, rgba(110,231,183,.12) 0%, transparent 60%), radial-gradient(ellipse 600px 500px at 90% 100%, rgba(167,139,250,.12) 0%, transparent 60%); transition: opacity .3s; }
body.dark::before { opacity: .4; }
.app { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:0 16px 60px; }

/* HEADER */
header { padding:24px 0 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-mark { width:38px; height:38px; background:linear-gradient(135deg,#10b981,#6366f1); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 4px 12px rgba(99,102,241,.3); }
.logo-text { font-size:22px; font-weight:800; letter-spacing:-.5px; background:linear-gradient(135deg,#10b981,#6366f1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.logo-sub { font-size:11px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; font-weight:500; margin-top:1px; }
.header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.date-nav { display:flex; align-items:center; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:6px 10px; }
.date-nav button { background:none; border:none; color:var(--text-secondary); cursor:pointer; width:28px; height:28px; border-radius:7px; font-size:14px; display:flex; align-items:center; justify-content:center; transition:background .15s,color .15s; }
.date-nav button:hover { background:var(--bg); color:var(--text-primary); }
.date-display { font-size:13px; font-weight:600; color:var(--text-primary); padding:0 6px; min-width:130px; text-align:center; font-family:var(--mono); }
.icon-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--text-secondary); font-size:16px; width:38px; height:38px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.icon-btn:hover { border-color:#10b981; color:#10b981; }
.add-btn { display:flex; align-items:center; gap:6px; background:linear-gradient(135deg,#10b981,#6366f1); border:none; border-radius:12px; color:white; font-family:var(--font); font-size:13px; font-weight:700; padding:10px 18px; cursor:pointer; transition:transform .15s,box-shadow .15s; box-shadow:0 4px 14px rgba(99,102,241,.3); }
.add-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(99,102,241,.4); }

/* DATE STRIP */
.date-strip { display:flex; gap:6px; margin-bottom:20px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
.date-strip::-webkit-scrollbar { display:none; }
.date-chip { flex-shrink:0; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:8px 14px; text-align:center; cursor:pointer; transition:all .15s; }
.date-chip:hover { border-color:#10b981; }
.date-chip.active { background:linear-gradient(135deg,#10b981,#059669); border-color:transparent; color:white; box-shadow:0 4px 12px rgba(16,185,129,.35); }
.date-chip .chip-day { font-size:10px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:2px; }
.date-chip.active .chip-day { color:rgba(255,255,255,.75); }
.date-chip .chip-num { font-size:18px; font-weight:800; line-height:1; font-family:var(--mono); }

/* CONTROLS BAR */
.controls-bar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
.legend { display:flex; flex-wrap:wrap; gap:8px; padding:12px 16px; background:var(--surface); border-radius:14px; border:1px solid var(--border); flex:1; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:11px; font-weight:600; color:var(--text-secondary); }
.legend-dot { width:12px; height:12px; border-radius:3px; }
.toggle-pills { display:flex; gap:6px; }
.toggle-pill { display:flex; align-items:center; gap:5px; background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:6px 12px; font-size:11px; font-weight:700; cursor:pointer; transition:all .15s; color:var(--text-secondary); white-space:nowrap; }
.toggle-pill:hover { border-color:#10b981; color:#10b981; }
.toggle-pill.on { background:#10b981; border-color:#10b981; color:white; }
.toggle-pill .dot { width:7px; height:7px; border-radius:50%; background:currentColor; opacity:.7; }

/* GRID */
.grid-outer { overflow-x:auto; padding-bottom:8px; }
.grid-outer::-webkit-scrollbar { height:6px; }
.grid-outer::-webkit-scrollbar-track { background:var(--border); border-radius:3px; }
.grid-outer::-webkit-scrollbar-thumb { background:#c4c9d6; border-radius:3px; }

.time-grid {
  display: inline-grid;
  grid-template-rows: auto repeat(24, 34px);
  gap: 0;
  column-gap: 8px;
  min-width: max-content;
}

.col-header-cell {
  width: 160px;
  min-width: 160px;
}

.col-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px 16px 0 0;
  padding: 16px 14px 14px;
  position: relative;
  cursor: grab;
  user-select: none;
  height: 100%;
}
.col-header:active { cursor: grabbing; }
.home-col .col-header { background: linear-gradient(160deg,#0f2027 0%,#1a2a3a 100%); border-color: rgba(16,185,129,.4); }

.drag-handle { position:absolute; top:10px; left:10px; display:flex; flex-direction:column; gap:2px; opacity:0; transition:opacity .15s; cursor:grab; padding:4px; }
.col-header-cell:hover .drag-handle { opacity:.5; }
.drag-handle span { display:block; width:14px; height:2px; border-radius:1px; background:#999; }

.home-badge { display:inline-flex; align-items:center; gap:4px; background:linear-gradient(135deg,#10b981,#059669); color:white; font-size:9px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; padding:3px 8px; border-radius:100px; margin-bottom:10px; }
.col-accent { height:3px; border-radius:2px; margin-bottom:12px; }
.col-city-name { font-size:15px; font-weight:800; letter-spacing:-.3px; line-height:1.1; margin-bottom:2px; }
.home-col .col-city-name { color:#fff; }
.col-country { font-size:11px; color:var(--text-muted); font-weight:500; margin-bottom:6px; }
.home-col .col-country { color:rgba(255,255,255,.5); }
.col-current-time { font-family:var(--mono); font-size:20px; font-weight:700; letter-spacing:-1px; line-height:1; margin-bottom:2px; }
.col-offset { font-size:10px; color:var(--text-muted); font-family:var(--mono); font-weight:500; }
.home-col .col-offset { color:rgba(255,255,255,.35); }

.col-remove { position:absolute; top:10px; right:10px; width:22px; height:22px; border-radius:6px; border:none; background:none; color:var(--text-muted); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s,color .15s; opacity:0; }
.col-header-cell:hover .col-remove { opacity:1; }
.col-remove:hover { background:#fee2e2; color:#ef4444; }

/* TILES */
.hour-tile {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  cursor: pointer; user-select: none;
  height: 34px;
  border-left: 1px solid rgba(0,0,0,.04);
  border-right: 1px solid rgba(0,0,0,.04);
  position: relative;
  transition: filter .1s;
}
.hour-tile.first-tile { border-top: 1px solid rgba(0,0,0,.04); }
.hour-tile.last-tile  { border-bottom: 1px solid rgba(0,0,0,.04); border-radius: 0 0 14px 14px; }
.tile-time   { font-family:var(--mono); font-size:13px; font-weight:700; letter-spacing:-.3px; position:relative; z-index:1; }
.tile-period { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; opacity:.6; font-family:var(--mono); position:relative; z-index:1; }
.hour-tile.highlighted { filter: brightness(.86) saturate(1.4); }
.hour-tile.selected-range { outline: 2px solid rgba(0,0,0,.3); outline-offset: -2px; }

.tile-sleep     { background:#dde1ea; color:#7a8298; }
.tile-early     { background:#bfdbfe; color:#1d4ed8; }
.tile-morning   { background:#a7f3d0; color:#065f46; }
.tile-work      { background:#6ee7b7; color:#064e3b; }
.tile-afternoon { background:#fde68a; color:#78350f; }
.tile-evening   { background:#fca5a5; color:#7f1d1d; }
.tile-night     { background:#c4b5fd; color:#4c1d95; }

body.dark .tile-sleep     { background:#1e2330; color:#6b7280; }
body.dark .tile-early     { background:#1e2d45; color:#60a5fa; }
body.dark .tile-morning   { background:#14312b; color:#34d399; }
body.dark .tile-work      { background:#0d3321; color:#6ee7b7; }
body.dark .tile-afternoon { background:#322a0e; color:#fcd34d; }
body.dark .tile-evening   { background:#321515; color:#fca5a5; }
body.dark .tile-night     { background:#1e1535; color:#a78bfa; }

/* NOW LINE */
.now-tile::before { content:''; position:absolute; inset:0; background:rgba(244,63,94,.12); border:2px solid rgba(244,63,94,.5); pointer-events:none; z-index:0; }
.now-tile::after  { content:'▶ NOW'; position:absolute; top:50%; transform:translateY(-50%); right:8px; font-size:9px; font-weight:800; letter-spacing:1px; color:#f43f5e; font-family:var(--mono); opacity:.9; pointer-events:none; z-index:2; }

/* DAY BOUNDARY */
.day-boundary-tile::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--day-border); z-index:3; border-radius:2px 2px 0 0; opacity:.8; }
.day-label { position:absolute; top:2px; right:8px; font-size:8px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--day-border); font-family:var(--mono); z-index:4; pointer-events:none; }

/* OVERLAP */
.overlap-tile::after { content:''; position:absolute; inset:0; background:var(--overlap-color); border-left:3px solid #10b981; pointer-events:none; z-index:0; }
.overlap-badge { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:#10b981; color:white; font-size:8px; font-weight:800; padding:2px 5px; border-radius:4px; letter-spacing:.5px; z-index:2; pointer-events:none; font-family:var(--mono); }

/* ADD COL */
.add-col-header { width:160px; min-width:160px; }
.add-col-inner { background:var(--surface); border:2px dashed var(--border); border-radius:16px; padding:24px 14px; display:flex; flex-direction:column; align-items:center; gap:10px; cursor:pointer; transition:border-color .2s,background .2s; text-align:center; height:100%; justify-content:center; }
.add-col-inner:hover { border-color:#10b981; background:rgba(16,185,129,.04); }
.add-col-icon { width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(99,102,241,.12)); display:flex; align-items:center; justify-content:center; font-size:22px; color:#10b981; transition:transform .2s; }
.add-col-inner:hover .add-col-icon { transform:scale(1.1); }
.add-col-text { font-size:12px; font-weight:600; color:var(--text-secondary); }
.add-tile-placeholder { height:34px; }

/* DRAG INDICATORS */
.col-header-cell.drag-over-left  { box-shadow: -3px 0 0 0 #10b981; }
.col-header-cell.drag-over-right { box-shadow:  3px 0 0 0 #10b981; }
.col-header-cell.dragging .col-header { opacity: .3; }
.col-header-cell.dragging .hour-tile  { opacity: .3; }

/* HOME DROP INDICATOR — glows red/pink when dragging over leftmost slot */
.col-header-cell.will-be-home { box-shadow: -4px 0 0 0 #f43f5e, 0 0 0 2px rgba(244,63,94,.25); }
.col-header-cell.will-be-home .col-header { outline: 2px dashed rgba(244,63,94,.5); border-radius: 16px 16px 0 0; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(15,22,35,.55); backdrop-filter:blur(6px); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border-radius:24px; padding:28px; width:100%; max-width:480px; box-shadow:0 24px 60px rgba(0,0,0,.25); transform:translateY(20px) scale(.97); transition:transform .25s cubic-bezier(.16,1,.3,1); position:relative; }
.modal-overlay.open .modal { transform:translateY(0) scale(1); }
.modal-title { font-size:20px; font-weight:800; margin-bottom:20px; letter-spacing:-.4px; }
.search-input { width:100%; padding:13px 16px; border:2px solid var(--border); border-radius:14px; font-family:var(--font); font-size:15px; outline:none; transition:border-color .2s,box-shadow .2s; background:var(--bg); margin-bottom:14px; color:var(--text-primary); }
.search-input:focus { border-color:#10b981; box-shadow:0 0 0 4px rgba(16,185,129,.1); }
.city-list { max-height:320px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
.city-option { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-radius:12px; cursor:pointer; transition:background .15s; border:1px solid transparent; }
.city-option:hover { background:var(--bg); border-color:var(--border); }
.city-option-name { font-weight:700; font-size:14px; }
.city-option-country { font-size:11px; color:var(--text-muted); margin-top:1px; }
.city-option-time { font-family:var(--mono); font-size:13px; font-weight:500; color:var(--text-secondary); }
.modal-close { position:absolute; top:20px; right:20px; width:32px; height:32px; border-radius:8px; border:none; background:var(--bg); cursor:pointer; font-size:16px; color:var(--text-secondary); display:flex; align-items:center; justify-content:center; }
.modal-close:hover { background:var(--border); }

/* TOOLTIP */
.tooltip-bar { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:#0f1623; color:white; padding:10px 20px; border-radius:100px; font-size:13px; font-weight:600; font-family:var(--mono); box-shadow:0 8px 24px rgba(0,0,0,.3); opacity:0; pointer-events:none; transition:opacity .2s,transform .2s; z-index:50; white-space:nowrap; }
.tooltip-bar.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* GHOST */
.drag-ghost { position:fixed; top:-9999px; left:-9999px; width:160px; background:var(--surface); border-radius:14px; padding:14px; box-shadow:0 16px 40px rgba(0,0,0,.25); border:2px solid #10b981; pointer-events:none; z-index:9999; font-family:var(--font); opacity:0; }
.drag-ghost .g-name { font-size:15px; font-weight:800; color:var(--text-primary); }
.drag-ghost .g-time { font-family:var(--mono); font-size:18px; font-weight:700; color:#10b981; margin-top:4px; }
.drag-ghost.will-be-home { border-color:#f43f5e; }
.drag-ghost.will-be-home .g-time { color:#f43f5e; }
.drag-ghost .g-hint { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#10b981; margin-top:6px; opacity:0; transition:opacity .15s; }
.drag-ghost.will-be-home .g-hint { color:#f43f5e; opacity:1; }

/* TOAST */
#saveToast { position:fixed; top:20px; right:20px; z-index:200; background:#0f1623; color:white; padding:10px 18px; border-radius:100px; font-size:12px; font-weight:600; font-family:var(--mono); display:flex; align-items:center; gap:7px; box-shadow:0 8px 24px rgba(0,0,0,.25); opacity:0; transform:translateY(-8px); transition:opacity .25s,transform .25s; pointer-events:none; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-mark">🌐</div>
      <div>
        <div class="logo-text">ZonePal</div>
        <div class="logo-sub">World Time Converter</div>
      </div>
    </div>
    <div class="header-right">
      <div class="date-nav">
        <button onclick="shiftDay(-1)">‹</button>
        <div class="date-display" id="dateDisplay"></div>
        <button onclick="shiftDay(1)">›</button>
        <button onclick="shiftDay(0)" style="font-size:11px;font-weight:700;color:#10b981;">Today</button>
      </div>
      <button class="icon-btn" id="darkBtn" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
      <button class="add-btn" onclick="openModal()">＋ Add City</button>
    </div>
  </header>

  <div class="date-strip" id="dateStrip"></div>

  <div class="controls-bar">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#dde1ea"></div>Sleep</div>
      <div class="legend-item"><div class="legend-dot" style="background:#bfdbfe"></div>Early</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a7f3d0"></div>Morning</div>
      <div class="legend-item"><div class="legend-dot" style="background:#6ee7b7"></div>Work</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fde68a"></div>Afternoon</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fca5a5"></div>Evening</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c4b5fd"></div>Night</div>
    </div>
    <div class="toggle-pills">
      <div class="toggle-pill on" id="pillNow"     onclick="toggleFeature('now')">    <div class="dot"></div>Now line</div>
      <div class="toggle-pill on" id="pillDay"     onclick="toggleFeature('day')">    <div class="dot"></div>Day marker</div>
      <div class="toggle-pill on" id="pillOverlap" onclick="toggleFeature('overlap')"><div class="dot"></div>Overlap</div>
    </div>
  </div>

  <div class="grid-outer">
    <div class="time-grid" id="timeGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Add a City</div>
    <input class="search-input" id="searchInput" placeholder="Search city or timezone…" oninput="filterCities(this.value)" autocomplete="off">
    <div class="city-list" id="cityList"></div>
  </div>
</div>

<div class="tooltip-bar" id="tooltipBar"></div>
<div id="saveToast"><span style="color:#10b981;font-size:14px;">✓</span> Saved</div>
<div class="drag-ghost" id="dragGhost">
  <div class="g-name" id="ghostName"></div>
  <div class="g-time" id="ghostTime"></div>
  <div class="g-hint" id="ghostHint">🏠 Set as Home</div>
</div>

<script>
const CITIES_DB = [
  {name:"New York",country:"United States",tz:"America/New_York"},
  {name:"Los Angeles",country:"United States",tz:"America/Los_Angeles"},

  {name:"Helsinki",country:"Finland",tz:"Europe/Helsinki"},
  {name:"Warsaw",country:"Poland",tz:"Europe/Warsaw"},

  {name:"Prague",country:"Czech Republic",tz:"Europe/Prague"},
  {name:"Athens",country:"Greece",tz:"Europe/Athens"},
  {name:"Istanbul",country:"Turkey",tz:"Europe/Istanbul"},
  {name:"Moscow",country:"Russia",tz:"Europe/Moscow"},
  {name:"Dubai",country:"UAE",tz:"Asia/Dubai"},
  {name:"Riyadh",country:"Saudi Arabia",tz:"Asia/Riyadh"},
  {name:"Tel Aviv",country:"Israel",tz:"Asia/Jerusalem"},
  {name:"Karachi",country:"Pakistan",tz:"Asia/Karachi"},
  {name:"Mumbai",country:"India",tz:"Asia/Kolkata"},
  {name:"Delhi",country:"India",tz:"Asia/Kolkata"},
  {name:"Dhaka",country:"Bangladesh",tz:"Asia/Dhaka"},
  {name:"Bangkok",country:"Thailand",tz:"Asia/Bangkok"},
  {name:"Ho Chi Minh City",country:"Vietnam",tz:"Asia/Ho_Chi_Minh"},
  {name:"Jakarta",country:"Indonesia",tz:"Asia/Jakarta"},
  {name:"Singapore",country:"Singapore",tz:"Asia/Singapore"},
  {name:"Kuala Lumpur",country:"Malaysia",tz:"Asia/Kuala_Lumpur"},
  {name:"Manila",country:"Philippines",tz:"Asia/Manila"},
  {name:"Hong Kong",country:"China",tz:"Asia/Hong_Kong"},
  {name:"Shanghai",country:"China",tz:"Asia/Shanghai"},
  {name:"Taipei",country:"Taiwan",tz:"Asia/Taipei"},
  {name:"Seoul",country:"South Korea",tz:"Asia/Seoul"},
  {name:"Tokyo",country:"Japan",tz:"Asia/Tokyo"},
  {name:"Sydney",country:"Australia",tz:"Australia/Sydney"},
  {name:"Melbourne",country:"Australia",tz:"Australia/Melbourne"},
  {name:"Brisbane",country:"Australia",tz:"Australia/Brisbane"},
  {name:"Perth",country:"Australia",tz:"Australia/Perth"},
  {name:"Auckland",country:"New Zealand",tz:"Pacific/Auckland"},
  {name:"Johannesburg",country:"South Africa",tz:"Africa/Johannesburg"},
  {name:"Cairo",country:"Egypt",tz:"Africa/Cairo"},
  {name:"Lagos",country:"Nigeria",tz:"Africa/Lagos"},
  {name:"Nairobi",country:"Kenya",tz:"Africa/Nairobi"},
  {name:"Casablanca",country:"Morocco",tz:"Africa/Casablanca"},
  {name:"Beirut",country:"Lebanon",tz:"Asia/Beirut"},
  {name:"UTC",country:"Coordinated Universal Time",tz:"UTC"},
];
const ACCENTS = ['linear-gradient(90deg,#10b981,#34d399)','linear-gradient(90deg,#6366f1,#818cf8)','linear-gradient(90deg,#f59e0b,#fcd34d)','linear-gradient(90deg,#ef4444,#f87171)','linear-gradient(90deg,#06b6d4,#67e8f9)','linear-gradient(90deg,#ec4899,#f9a8d4)'];
const ACCENT_COLORS = ['#065f46','#312e81','#78350f','#7f1d1d','#164e63','#831843'];
const WORK_START = 9, WORK_END = 17;

let activeDate = new Date(); activeDate.setHours(0,0,0,0);
let activeCities, homeIdx, saveToastTimer;
let features = { now:true, day:true, overlap:true };
let darkMode = false;

// ── PERSIST ──
function saveCities() {
  try {
    localStorage.setItem('zonepal_cities', JSON.stringify(activeCities.map(c=>({name:c.name,tz:c.tz}))));
    localStorage.setItem('zonepal_home', String(homeIdx));
  } catch(e){}
  const t = document.getElementById('saveToast');
  t.style.opacity='1'; t.style.transform='translateY(0)';
  clearTimeout(saveToastTimer);
  saveToastTimer = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateY(-8px)'; }, 1800);
}
function loadCities() {
  try {
    const raw = localStorage.getItem('zonepal_cities');
    if (!raw) return null;
    const r = JSON.parse(raw).map(s=>CITIES_DB.find(c=>c.name===s.name&&c.tz===s.tz)).filter(Boolean);
    return r.length ? r : null;
  } catch(e){ return null; }
}
activeCities = loadCities() || [
  CITIES_DB.find(c=>c.name==='New York'),
  CITIES_DB.find(c=>c.name==='London'),
  CITIES_DB.find(c=>c.name==='Tokyo'),
];
try { homeIdx = Math.min(parseInt(localStorage.getItem('zonepal_home')||'0',10)||0, activeCities.length-1); } catch(e){ homeIdx=0; }

// ── DARK MODE ──
function toggleDark() {
  darkMode = !darkMode;
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('darkBtn').textContent = darkMode ? '☀️' : '🌙';
  try { localStorage.setItem('zonepal_dark', darkMode?'1':'0'); } catch(e){}
}
try { if (localStorage.getItem('zonepal_dark')==='1') toggleDark(); } catch(e){}

// ── FEATURE TOGGLES ──
function toggleFeature(f) {
  features[f] = !features[f];
  const k = 'pill'+f.charAt(0).toUpperCase()+f.slice(1);
  document.getElementById(k).classList.toggle('on', features[f]);
  buildGrid();
}

// ── HELPERS ──
function getTileClass(h) {
  if (h<5) return 'tile-sleep'; if (h<7) return 'tile-early'; if (h<9) return 'tile-morning';
  if (h<17) return 'tile-work'; if (h<20) return 'tile-afternoon'; if (h<22) return 'tile-evening';
  return 'tile-night';
}
function getLocalHour(utcDate, tz) {
  return parseInt(new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'numeric',hour12:false}).format(utcDate),10)%24;
}
function getLocalDate(utcDate, tz) {
  return new Intl.DateTimeFormat('en-US',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit'}).format(utcDate);
}
function formatCurrentTime(tz) {
  return new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}).format(new Date());
}
function getUTCOffset(tz) {
  const s = new Intl.DateTimeFormat('en',{timeZone:tz,timeZoneName:'shortOffset'}).formatToParts(new Date());
  return (s.find(p=>p.type==='timeZoneName')||{value:'UTC'}).value;
}
function localHourToUTC(date, hour, tz) {
  const probe = new Date(date.getTime()+hour*3600000);
  return probe.getTime()+(hour-getLocalHour(probe,tz))*3600000;
}

function computeOverlapHours() {
  const set = new Set();
  if (activeCities.length < 2) return set;
  const homeTz = activeCities[homeIdx].tz;
  for (let h=0; h<24; h++) {
    const utcMs = localHourToUTC(activeDate, h, homeTz);
    if (activeCities.every(c => { const lh=getLocalHour(new Date(utcMs),c.tz); return lh>=WORK_START&&lh<WORK_END; }))
      set.add(h);
  }
  return set;
}
function getCurrentHomeHour() {
  const now = new Date();
  const todayMs = (()=>{ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); })();
  if (activeDate.getTime() !== todayMs) return -1;
  return getLocalHour(now, activeCities[homeIdx].tz);
}
function buildDayBoundaryMap() {
  const map = {};
  const homeTz = activeCities[homeIdx].tz;
  activeCities.forEach((city, ci) => {
    map[ci] = {};
    let prev = null;
    for (let h=0; h<24; h++) {
      const d = getLocalDate(new Date(localHourToUTC(activeDate,h,homeTz)), city.tz);
      if (prev && d !== prev) map[ci][h] = true;
      prev = d;
    }
  });
  return map;
}

// ── BUILD GRID ──
function buildGrid() {
  const grid = document.getElementById('timeGrid');
  grid.innerHTML = '';

  const n = activeCities.length;
  const showAdd = n < 6;
  const totalCols = n + (showAdd ? 1 : 0);

  grid.style.gridTemplateColumns = `repeat(${totalCols}, 160px)`;
  grid.style.gridTemplateRows = `auto repeat(24, 34px)`;

  const overlapHours  = features.overlap ? computeOverlapHours() : new Set();
  const nowHour       = features.now     ? getCurrentHomeHour()  : -1;
  const dayBoundary   = features.day     ? buildDayBoundaryMap() : {};
  const homeTz        = activeCities[homeIdx].tz;

  // ── ROW 1: headers ──
  activeCities.forEach((city, idx) => {
    const isHome = idx === homeIdx;
    const ai = idx % ACCENTS.length;

    const cell = document.createElement('div');
    cell.className = 'col-header-cell' + (isHome ? ' home-col' : '');
    cell.dataset.idx = idx;
    cell.style.gridRow = '1';

    const hdr = document.createElement('div');
    hdr.className = 'col-header';
    hdr.innerHTML = `
      <div class="drag-handle"><span></span><span></span><span></span></div>
      ${!isHome ? `<button class="col-remove">✕</button>` : ''}
      ${isHome
        ? `<div class="home-badge">🏠 Home</div>`
        : `<div class="col-accent" style="background:${ACCENTS[ai]}"></div>`}
      <div class="col-city-name">${city.name}</div>
      <div class="col-country">${city.country}</div>
      <div class="col-current-time" id="ct-${idx}" style="color:${isHome?'#10b981':ACCENT_COLORS[ai]}">${formatCurrentTime(city.tz)}</div>
      <div class="col-offset">${getUTCOffset(city.tz)}</div>
    `;

    const rmBtn = hdr.querySelector('.col-remove');
    if (rmBtn) {
      rmBtn.addEventListener('mousedown', e => e.stopPropagation());
      rmBtn.addEventListener('click', () => removeCity(idx));
    }
    hdr.addEventListener('mousedown', e => onHeaderMouseDown(e, cell));
    cell.appendChild(hdr);
    grid.appendChild(cell);
  });

  // Add column header
  if (showAdd) {
    const addHdr = document.createElement('div');
    addHdr.className = 'add-col-header';
    addHdr.style.gridRow = '1';
    addHdr.innerHTML = `<div class="add-col-inner" onclick="openModal()"><div class="add-col-icon">＋</div><div class="add-col-text">Add city</div></div>`;
    grid.appendChild(addHdr);
  }

  // ── ROWS 2–25: tiles ──
  for (let h = 0; h < 24; h++) {
    const utcMs   = localHourToUTC(activeDate, h, homeTz);
    const isNow   = h === nowHour;
    const isOvlp  = overlapHours.has(h);

    activeCities.forEach((city, idx) => {
      const lh = (idx === homeIdx) ? h : getLocalHour(new Date(utcMs), city.tz);
      const disp = lh===0?12:(lh>12?lh-12:lh);
      const period = lh>=12?'pm':'am';
      const isBound = dayBoundary[idx] && dayBoundary[idx][h];

      const tile = document.createElement('div');
      tile.className = [
        'hour-tile',
        getTileClass(lh),
        isNow   ? 'now-tile'           : '',
        isOvlp  ? 'overlap-tile'       : '',
        isBound ? 'day-boundary-tile'  : '',
        h === 0  ? 'first-tile'        : '',
        h === 23 ? 'last-tile'         : '',
      ].filter(Boolean).join(' ');

      tile.dataset.homeHour = h;
      tile.style.gridRow    = `${h + 2}`;
      tile.style.gridColumn = `${idx + 1}`;

      let extra = '';
      if (isOvlp && idx === 0) extra += `<span class="overlap-badge">✓ ALL</span>`;
      if (isBound) extra += `<span class="day-label">+1d</span>`;

      tile.innerHTML = `<span class="tile-time">${disp}:00</span><span class="tile-period">${period}</span>${extra}`;
      tile.addEventListener('mouseenter', () => onTileHover(h));
      tile.addEventListener('mouseleave', onTileLeave);
      tile.addEventListener('click', () => onTileClick(h));
      grid.appendChild(tile);
    });

    if (showAdd) {
      const ph = document.createElement('div');
      ph.className = 'add-tile-placeholder';
      ph.style.gridRow    = `${h + 2}`;
      ph.style.gridColumn = `${n + 1}`;
      grid.appendChild(ph);
    }
  }

  if (nowHour >= 0) {
    const nt = grid.querySelector('.now-tile');
    if (nt) setTimeout(() => nt.scrollIntoView({block:'center',behavior:'smooth'}), 80);
  }
}

// ── DRAG ──
let dragIdx=null, overIdx=null, ghostEl, ghostOffX, ghostOffY;

function onHeaderMouseDown(e, cell) {
  if (e.target.closest('button')) return;
  e.preventDefault();
  dragIdx = parseInt(cell.dataset.idx, 10);
  const city = activeCities[dragIdx];
  ghostEl = document.getElementById('dragGhost');
  document.getElementById('ghostName').textContent = city.name;
  document.getElementById('ghostTime').textContent = formatCurrentTime(city.tz);
  const rect = cell.getBoundingClientRect();
  ghostOffX = e.clientX - rect.left;
  ghostOffY = e.clientY - rect.top;
  ghostEl.style.left = (e.clientX - ghostOffX) + 'px';
  ghostEl.style.top  = (e.clientY - ghostOffY) + 'px';
  ghostEl.style.opacity = '1';
  ghostEl.classList.remove('will-be-home');
  cell.classList.add('dragging');
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup',   onDragEnd);
}

function onDragMove(e) {
  if (dragIdx === null) return;
  ghostEl.style.left = (e.clientX - ghostOffX) + 'px';
  ghostEl.style.top  = (e.clientY - ghostOffY) + 'px';

  const cells = document.querySelectorAll('.col-header-cell');
  let found = null;
  let foundSide = null;
  cells.forEach(c => {
    c.classList.remove('drag-over-left','drag-over-right','will-be-home');
    const r = c.getBoundingClientRect();
    if (e.clientX >= r.left && e.clientX <= r.right) {
      found = parseInt(c.dataset.idx, 10);
      foundSide = e.clientX < r.left + r.width/2 ? 'left' : 'right';
    }
  });

  if (found !== null && found !== dragIdx) {
    overIdx = found;
    const oc = document.querySelector(`.col-header-cell[data-idx="${overIdx}"]`);
    if (oc) {
      const r = oc.getBoundingClientRect();
      // Whole leftmost column is the "set as home" zone — ignore left/right half
      if (overIdx === 0) {
        oc.classList.add('will-be-home');
        ghostEl.classList.add('will-be-home');
      } else {
        const side = e.clientX < r.left + r.width/2 ? 'left' : 'right';
        let ins = overIdx + (side === 'right' ? 1 : 0);
        let t = ins > dragIdx ? ins - 1 : ins;
        t = Math.max(0, Math.min(t, activeCities.length - 1));
        oc.classList.add(side === 'left' ? 'drag-over-left' : 'drag-over-right');
        ghostEl.classList.remove('will-be-home');
      }
    }
  } else {
    overIdx = null;
    ghostEl.classList.remove('will-be-home');
  }
}

function onDragEnd(e) {
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup',   onDragEnd);
  ghostEl.style.opacity = '0'; ghostEl.style.top = '-9999px';
  ghostEl.classList.remove('will-be-home');
  document.querySelectorAll('.col-header-cell').forEach(c => c.classList.remove('dragging','drag-over-left','drag-over-right','will-be-home'));

  if (dragIdx !== null && overIdx !== null && dragIdx !== overIdx) {
    const oc = document.querySelector(`.col-header-cell[data-idx="${overIdx}"]`);
    let ins = overIdx;
    // Whole leftmost column = position 0 drop zone; skip half-check
    if (oc && overIdx !== 0) { const r = oc.getBoundingClientRect(); if (e.clientX >= r.left + r.width/2) ins = overIdx+1; }
    const item = activeCities.splice(dragIdx, 1)[0];
    const wasHome = dragIdx === homeIdx;
    if (!wasHome && homeIdx > dragIdx) homeIdx--;
    let t = ins > dragIdx ? ins-1 : ins;
    t = Math.max(0, Math.min(t, activeCities.length));
    activeCities.splice(t, 0, item);
    // If dropped at position 0, it becomes the new home
    if (t === 0) {
      homeIdx = 0;
    } else if (wasHome) {
      homeIdx = t;
    } else if (homeIdx >= t) {
      homeIdx++;
    }
    saveCities(); renderAll();
  } else {
    buildGrid();
  }
  dragIdx = null; overIdx = null;
}

// ── TILE EVENTS ──
function onTileHover(h) {
  document.querySelectorAll('.hour-tile').forEach(t => t.classList.remove('highlighted'));
  document.querySelectorAll(`[data-home-hour="${h}"]`).forEach(t => t.classList.add('highlighted'));
  const utcMs = localHourToUTC(activeDate, h, activeCities[homeIdx].tz);
  const times = activeCities.map(c => { const lh=getLocalHour(new Date(utcMs),c.tz); return `${c.name} ${lh===0?12:lh>12?lh-12:lh}${lh>=12?'pm':'am'}`; }).join('  ·  ');
  showTooltip(times);
}
function onTileLeave() {
  document.querySelectorAll('.hour-tile').forEach(t => t.classList.remove('highlighted'));
  hideTooltip();
}
function onTileClick(h) {
  document.querySelectorAll('.hour-tile').forEach(t => t.classList.remove('selected-range'));
  document.querySelectorAll(`[data-home-hour="${h}"]`).forEach(t => t.classList.add('selected-range'));
}

// ── CITY MANAGEMENT ──
function removeCity(idx) {
  if (activeCities.length <= 1 || idx === homeIdx) return;
  activeCities.splice(idx, 1);
  if (homeIdx > idx) homeIdx--;
  saveCities(); renderAll();
}
function addCity(name) {
  const city = CITIES_DB.find(c => c.name === name);
  if (city && activeCities.length < 6) { activeCities.push(city); saveCities(); closeModal(); renderAll(); }
}

// ── DATE ──
function buildDateStrip() {
  const strip = document.getElementById('dateStrip'); strip.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i=-3; i<=6; i++) {
    const d = new Date(today.getTime()+i*86400000);
    const chip = document.createElement('div');
    chip.className = 'date-chip'+(d.getTime()===activeDate.getTime()?' active':'');
    const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
    chip.innerHTML=`<div class="chip-day">${days[d.getDay()]}</div><div class="chip-num">${d.getDate()}</div>`;
    chip.onclick = () => { activeDate = d; renderAll(); };
    strip.appendChild(chip);
  }
  const a = strip.querySelector('.active');
  if (a) a.scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'});
}
function updateDateDisplay() {
  document.getElementById('dateDisplay').textContent = activeDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}
function shiftDay(n) {
  if (n===0) { activeDate=new Date(); activeDate.setHours(0,0,0,0); }
  else activeDate = new Date(activeDate.getTime()+n*86400000);
  renderAll();
}

// ── MODAL ──
function openModal() { document.getElementById('searchInput').value=''; renderCityList(''); document.getElementById('modalOverlay').classList.add('open'); setTimeout(()=>document.getElementById('searchInput').focus(),100); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOnBg(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }
function filterCities(q) { renderCityList(q.toLowerCase()); }
function renderCityList(q) {
  const list = document.getElementById('cityList');
  const already = new Set(activeCities.map(c=>c.tz+c.name));
  const filtered = CITIES_DB.filter(c=>!already.has(c.tz+c.name)&&(c.name.toLowerCase().includes(q)||c.country.toLowerCase().includes(q)||c.tz.toLowerCase().includes(q))).slice(0,30);
  list.innerHTML = filtered.map(c=>`<div class="city-option" onclick="addCity('${c.name.replace(/'/g,"\\'")}')"><div><div class="city-option-name">${c.name}</div><div class="city-option-country">${c.country}</div></div><div class="city-option-time">${formatCurrentTime(c.tz)}</div></div>`).join('');
}

// ── TOOLTIP ──
let tipTimer;
function showTooltip(t) { clearTimeout(tipTimer); const el=document.getElementById('tooltipBar'); el.textContent=t; el.classList.add('show'); }
function hideTooltip() { tipTimer = setTimeout(()=>document.getElementById('tooltipBar').classList.remove('show'), 200); }

// ── CLOCKS ──
function tickClocks() { activeCities.forEach((c,i)=>{ const el=document.getElementById('ct-'+i); if(el) el.textContent=formatCurrentTime(c.tz); }); }

function renderAll() { buildDateStrip(); updateDateDisplay(); buildGrid(); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
renderAll();
setInterval(tickClocks, 1000);
setInterval(buildGrid, 60000);
</script>
</body>
